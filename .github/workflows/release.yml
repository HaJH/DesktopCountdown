name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo build --release
      # A single self-contained exe: the CRT is linked statically (.cargo/config.toml) and
      # everything else it needs ships with Windows, so there is nothing to zip it with.
      - name: Publish the release
        run: >
          gh release create "$env:GITHUB_REF_NAME"
          target/release/desktop-countdown.exe
          --title "$env:GITHUB_REF_NAME"
          --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
