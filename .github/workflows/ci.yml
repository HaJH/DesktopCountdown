name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      # The renderer tests drive real Direct2D/DirectWrite against an offscreen WIC bitmap, so
      # they run without a GPU or a desktop session.
      - run: cargo test
