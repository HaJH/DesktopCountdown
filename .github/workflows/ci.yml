name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    strategy:
      # One platform's failure should not hide the other's.
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      # Both renderers draw into an offscreen bitmap -- Direct2D/DirectWrite into a WIC
      # bitmap, CoreText/CoreGraphics into a CGBitmapContext -- so the pixel tests need
      # neither a GPU nor a desktop session. The ones that would (a real NSScreen, a live
      # launch agent) are #[ignore]d.
      - run: cargo test
